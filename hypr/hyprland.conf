##########################
########MONITOR###########
##########################

monitor=,preferred,auto,1

##########################
#########INPUT############
##########################
input {
	kb_layout = us
        follow_mouse = 1
        sensitivity = 0
}


cursor {
	no_hardware_cursors = true
        inactive_timeout = 10
}

##########################
########GENERAL###########
##########################
general {
	layout = dwindle
	gaps_in = 6
	gaps_out = 4
	border_size = 2
	col.active_border = rgb(89b4fa)
	col.inactive_border = rgb(313244)
}

##########################
#####DECORATION###########
##########################
decoration {
	rounding = 8
	blur {
		enabled = true
		size = 3
		passes = 2
	}
}


##########################
#########VSYNC############
##########################
#Prevents Frame drops
misc {
	vfr = true
}


##########################
#######ANIMATIONS#########
##########################
animations {
	enabled = yes
	
	bezier = smooth,0.1,0.9,0.36,1.05
	animation = windows, 1, 6, smooth
	animation = border, 1, 6, smooth
	animation = windowsOut, 1, 6, smooth, popin 60%
	animation = fade, 1, 6, smooth
	animation = workspaces, 1, 6, smooth
}

##########################
#######AUTOSTART##########
##########################
exec-once = ~/.config/waybar/scripts/launch.sh &
exec-once = nm-applet &
#exec-once = blueman-applet &
exec-once = dbus-update-activate-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = systemctl --user restart piperwire pipewire-pulse wireplumber
exec-once = swww-daemon
##########################
#####ENV##################
##########################


env = XDG_CURRENT_DESKTOP,Hyprland

##########################
#####KEYBINDS#############
##########################

bind = SUPER, Return, exec, kitty
bind = SUPER_SHIFT,Return, exec, rofi
bind = SUPER, B, exec, thunar
bind = SUPER, escape, killactive
bind = SUPER, Q, killactive
bind = SUPER, R, exec, ~/.config/waybar/scripts/launch.sh
#Zsh SHELL->Default SHELL for the 'root' USER
bind = SUPER, M, exit,

#DISPLAY
bind = SUPER, F, fullscreen,

#WAYBAR-WOFI
bind = SUPER_SHIFT, W, exec, waybar
bind = SUPER,SPACE, exec, wofi --show drun
bind = SUPER, V, togglefloating

#FOCUS
bind = SUPER, TAB, cyclenext    
bind = SUPER_SHIFT, TAB, cyclenext, prev  

bind = SUPER, W, movefocus, u
bind = SUPER, S, movefocus, d
bind = SUPER, A, movefocus, l
bind = SUPER, D, movefocus, r


#COPY - SCREENSHOT
#Full screen screenshot
bind = , Print, exec, grim ~/Pictures/screenshot.png

#Select area screenshot
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot.png

#Copy selected area to clipboard
bind = CTRL SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy



#CREATE WORKSPACE
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

#SHIFT WORKSPACE
bind = SUPER_SHIFT, 1, movetoworkspace, 1
bind = SUPER_SHIFT, 2, movetoworkspace, 2
bind = SUPER_SHIFT, 3, movetoworkspace, 3
bind = SUPER_SHIFT, 4, movetoworkspace, 4
bind = SUPER_SHIFT, 5, movetoworkspace, 5
bind = SUPER_SHIFT, 6, movetoworkspace, 6
bind = SUPER_SHIFT, 7, movetoworkspace, 7
bind = SUPER_SHIFT, 8, movetoworkspace, 8
bind = SUPER_SHIFT, 9, movetoworkspace, 9
