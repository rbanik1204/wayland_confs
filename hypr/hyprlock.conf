    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H")"
    color       = rgba(255, 255, 255, 0.93)
    font_size   = 160
    font_family = JetBrainsMono Nerd Font Bold
    position    = -340, 100
    halign      = center
    valign      = center
    shadow_passes = 3
    shadow_size   = 20
    shadow_color  = rgba(0, 0, 0, 0.70)
