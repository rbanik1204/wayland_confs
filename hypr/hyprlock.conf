# PASSWORD FIELD
# Sleek frosted glass, rich feedback states
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
input-field {
    monitor  =
    size     = 275, 50
    rounding = 12

    outline_thickness = 1
    outer_color = rgba(255, 255, 255, 0.18)
    inner_color = rgba(8, 8, 18, 0.60)
    font_color  = rgba(255, 255, 255, 1.0)
    font_family = JetBrainsMono Nerd Font

    dots_size     = 0.24
    dots_spacing  = 0.22
    dots_center   = true
    dots_rounding = -1

    placeholder_text = '<span foreground="##7a7d9a" font_size="12pt">  enter password</span>'

    fade_on_empty = true
    fade_timeout  = 1000

    check_color     = rgba(120, 215, 150, 0.95)
    fail_color      = rgba(235, 95, 95, 0.90)
    fail_text       = '<span foreground="##eb5f5f" font_size="11pt"> wrong password</span>'
    # fail_timeout    = 2500
    # fail_transition = 400

    capslock_color = rgba(255, 205, 70, 0.90)
    numlock_color  = rgba(160, 215, 255, 0.85)

    position = 310, -52
    halign   = center
    valign   = center
    zindex   = 3
}

